<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Threeaxis Static HTML</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f9fafb;
        color: #111827;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .container {
        max-width: 720px;
        width: 100%;
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
        padding: 3rem;
      }
      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.5rem);
        letter-spacing: -0.03em;
      }
      p {
        margin: 1.5rem 0 0;
        line-height: 1.75;
        color: #475569;
      }
      a {
        color: #0f766e;
        text-decoration: none;
        font-weight: 600;
      }
      .badge {
        display: inline-flex;
        margin-top: 1.5rem;
        padding: 0.45rem 0.9rem;
        border-radius: 9999px;
        background: #ecfeff;
        color: #0f766e;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="badge">Static HTML</div>
      <h1>Threeaxis Static Page</h1>
      <p>
        This page is deployed from the `docs/` folder using GitHub Actions. Push to `main` and the workflow
        will publish this static page to GitHub Pages.
      </p>
      <p>
        <a href="https://github.com/ThiyagarajMohan/Threeaxis">View repository</a>
      </p>
    </div>
  </body>
</html>
